name: Deploy demo to GitHub Pages

# Builds apps/web as a static export and publishes it to GitHub Pages.
# Custom domain: iwpc.silurus.dev (configured via the CNAME file in
# apps/web/public/CNAME). Make sure the same value is set in the
# repository's Pages settings, and that a DNS CNAME record points
# iwpc.silurus.dev -> yukiyokotani.github.io.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build static export
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build demo
        run: pnpm -r --filter web build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
